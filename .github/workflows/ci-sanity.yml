name: CI Sanity

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff==0.1.6"

      - name: Ruff
        run: |
          python -m ruff check .
          python -m ruff format --check .

  test-sanity:
    name: Tests (sanity)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "ci-test-secret-key-only"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: smartsell_test
        options: >-
          --health-cmd "pg_isready -U postgres -d smartsell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "psycopg[binary]" asyncpg pytest pytest-asyncio pytest-timeout

      - name: Run migrations (sync driver)
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/smartsell_test
          ENVIRONMENT: test
          TESTING: "True"
        run: alembic upgrade head

      - name: Pytest (sanity)
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/smartsell_test
          TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/smartsell_test
          TEST_ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/smartsell_test
          ENVIRONMENT: test
          TESTING: "True"
          REDIS_URL: redis://localhost:6379
        run: |
          python -m pytest -q tests/app \
            -k "auth or health or subscriptions or preorders or reports or openapi" \
            --tb=short --maxfail=1
